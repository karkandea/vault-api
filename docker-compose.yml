version: '3.8'

services:
  vault-api:
    build:
      context: .
      dockerfile: Dockerfile
    image: vault-api:latest
    container_name: vault-api
    ports:
      - "8080:8080"
    environment:
      - ASPNETCORE_ENVIRONMENT=Development
    env_file:
      - .env
    volumes:
      - ./logs:/app/logs
    restart: unless-stopped
    networks:
      - vault-network

networks:
  vault-network:
    driver: bridge
